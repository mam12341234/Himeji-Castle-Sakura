<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孟芸的櫻花手冊</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vuedraggable/4.1.0/vuedraggable.umd.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sakura-pink': '#fff5f5',
                        'sakura-main': '#fecaca',
                        'sakura-dark': '#f472b6',
                        'jp-gray': '#4a4a4a'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff5f5; -webkit-tap-highlight-color: transparent; }
        .rounded-header { border-radius: 40px 40px 0 0; margin-top: -40px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass-tab { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); }
        .drag-ghost { opacity: 0.5; background: #fecaca; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-sakura-pink pb-24">
        
        <header class="relative w-full h-[250px] overflow-hidden">
            <img src="https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=400" 
                 class="w-full h-full object-cover" alt="Himeji Castle">
            <div class="absolute inset-0 bg-gradient-to-b from-black/20 to-transparent"></div>
            
            <div class="absolute bottom-12 right-4 flex space-x-2 glass-tab p-1.5 rounded-2xl shadow-xl z-20">
                <button @click="currentTab = 'itinerary'" :class="{'bg-sakura-dark text-white shadow-md': currentTab === 'itinerary', 'text-gray-500': currentTab !== 'itinerary'}" class="w-10 h-10 rounded-xl transition-all flex items-center justify-center"><i class="fa-solid fa-location-dot"></i></button>
                <button @click="currentTab = 'info'" :class="{'bg-sakura-dark text-white shadow-md': currentTab === 'info', 'text-gray-500': currentTab !== 'info'}" class="w-10 h-10 rounded-xl transition-all flex items-center justify-center"><i class="fa-solid fa-info"></i></button>
                <button @click="currentTab = 'shopping'" :class="{'bg-sakura-dark text-white shadow-md': currentTab === 'shopping', 'text-gray-500': currentTab !== 'shopping'}" class="w-10 h-10 rounded-xl transition-all flex items-center justify-center"><i class="fa-solid fa-basket-shopping"></i></button>
                <button @click="currentTab = 'expenses'" :class="{'bg-sakura-dark text-white shadow-md': currentTab === 'expenses', 'text-gray-500': currentTab !== 'expenses'}" class="w-10 h-10 rounded-xl transition-all flex items-center justify-center"><i class="fa-solid fa-coins"></i></button>
            </div>
        </header>

        <main class="relative z-10 bg-white rounded-header px-4 pt-8 min-h-[600px]">
            
            <section v-if="currentTab === 'itinerary'">
                <div class="flex overflow-x-auto space-x-4 mb-6 pb-2 hide-scrollbar">
                    <button v-for="day in schedule" :key="day.date" 
                            @click="selectedDate = day.date"
                            class="flex flex-col items-center min-w-[65px] p-2 rounded-2xl transition-all"
                            :class="selectedDate === day.date ? 'bg-sakura-main text-white shadow-md' : 'text-gray-400 bg-gray-50'">
                        <span class="text-[14px] uppercase font-bold">{{ day.weekday }}</span>
                        <span class="text-xl font-bold leading-tight">{{ day.dayNum }}</span>
                    </button>
                </div>

                <div class="bg-blue-50/50 rounded-2xl p-4 mb-6 flex items-center justify-between border border-blue-100/50">
                    <div class="flex items-center space-x-3">
                        <i class="fa-solid fa-cloud-sun text-blue-400 text-2xl"></i>
                        <div><p class="text-xs font-bold text-gray-700">今日天氣預報</p><p class="text-[10px] text-gray-400">大阪/神戶 地區</p></div>
                    </div>
                    <div class="text-right"><p class="text-xl font-bold text-gray-800">14°C</p><p class="text-[10px] text-gray-500">體感 12°C</p></div>
                </div>

                <draggable v-model="currentDayItems" item-key="id" ghost-class="drag-ghost" handle=".drag-handle">
                    <template #item="{element, index}">
                        <div class="mb-2">
                            <div v-if="index > 0" class="flex items-center ml-8 my-2 text-gray-300 space-x-2">
                                <div class="h-6 w-px border-l-2 border-dashed border-sakura-main"></div>
                                <i :class="element.type === '大眾運輸' ? 'fa-solid fa-bus-simple' : 'fa-solid fa-person-walking'" class="text-[10px]"></i>
                                <span class="text-[9px] font-medium text-gray-400">約 15-30 min</span>
                            </div>

                            <div v-if="element.category === '航班'" class="bg-gradient-to-br from-rose-400 to-pink-500 rounded-3xl p-5 text-white shadow-lg relative overflow-hidden">
                                <i class="fa-solid fa-plane absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12"></i>
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[10px] font-bold tracking-widest bg-white/20 px-3 py-1 rounded-full uppercase">{{ element.flightNum }}</span>
                                    <span class="text-[10px] opacity-80">{{ selectedDate }}</span>
                                </div>
                                <div class="flex justify-between items-center px-2">
                                    <div class="text-center"><p class="text-2xl font-bold">{{ element.depTime }}</p><p class="text-[10px] tracking-tighter">{{ element.depAirport }}</p></div>
                                    <div class="h-px flex-1 bg-white/30 mx-4 relative"><i class="fa-solid fa-plane text-xs absolute left-1/2 -translate-x-1/2 -top-1.5"></i></div>
                                    <div class="text-center"><p class="text-2xl font-bold">{{ element.arrTime }}</p><p class="text-[10px] tracking-tighter">{{ element.arrAirport }}</p></div>
                                </div>
                            </div>

                            <div v-else class="bg-white border border-gray-100 rounded-3xl p-4 shadow-sm flex items-start space-x-3">
                                <div class="drag-handle cursor-grab text-gray-200 pt-2"><i class="fa-solid fa-grip-lines"></i></div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-bold text-gray-800">{{ element.time }} {{ element.name }}</h4>
                                        <span class="text-[9px] px-2 py-0.5 rounded-full bg-sakura-pink text-sakura-dark border border-sakura-main/30">{{ element.category }}</span>
                                    </div>
                                    <p v-if="element.hours" class="text-[10px] text-gray-400 mt-1"><i class="fa-regular fa-clock mr-1"></i>{{ element.hours }}</p>
                                    <div v-if="element.note" class="bg-pink-50/50 rounded-xl p-2 mt-2 text-[11px] text-gray-600 leading-relaxed">{{ element.note }}</div>
                                    <div class="flex space-x-2 mt-3">
                                        <button @click="openNav(element.name)" class="flex-1 py-2 bg-sakura-pink text-sakura-dark text-[11px] font-bold rounded-xl hover:bg-sakura-main transition-all"><i class="fa-solid fa-location-arrow mr-1"></i>導航</button>
                                        <button @click="deleteItem(element.id)" class="px-3 py-2 text-gray-200 hover:text-red-300"><i class="fa-solid fa-trash-can text-xs"></i></button
